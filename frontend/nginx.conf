types {
  application/javascript  js mjs;
  text/css                css;
  text/html               html htm;
  image/svg+xml           svg svgz;
  image/png               png;
  image/jpeg              jpeg jpg;
  image/gif               gif;
  image/x-icon            ico;
  font/woff               woff;
  font/woff2              woff2;
  application/octet-stream bin;
}

server {
  listen 80;
  client_max_body_size 30m;
  server_name _;

  root /usr/share/nginx/html;

  # 1. API: todas las peticiones a /api van al backend NestJS
  location /api/ {
    proxy_pass http://api:3001/api/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_cache_bypass $http_upgrade;
  }

  # 2. index.html: nunca cacheado — el navegador siempre pide la version mas nueva
  #    Esto es clave: cuando hay un deploy nuevo, el navegador detecta el cambio aqui
  #    y descarga los nuevos JS/CSS (que tienen hashes distintos en el nombre).
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  # 3a. version.json: nunca cacheado — permite al cliente detectar nuevos deploys
  location = /version.json {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  # 3. Assets con hash en el nombre (JS, CSS, fuentes, imagenes):
  #    Cache de 1 anio — el hash en el nombre garantiza que si el contenido
  #    cambia, el archivo tiene un nombre distinto y el navegador lo descarga fresco.
  location ~* \.(js|mjs|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # 4. Rutas de React: si no encuentra el archivo, carga index.html
  #    Se incluye no-cache aqui tambien para cuando try_files sirve index.html
  #    directamente (el bloque = /index.html no aplica en ese caso).
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
}
